<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=https://www.beyondshowrooms.com/?utm_source=youtube&amp;utm_medium=video&amp;utm_campaign=ep1">
    <link rel="canonical" href="https://www.beyondshowrooms.com/">
    <title>Redirecting to Beyond Showrooms…</title>
    <script>
    (function () {
        var target = new URL('https://www.beyondshowrooms.com/');
        target.searchParams.set('utm_source', 'youtube');
        target.searchParams.set('utm_medium', 'video');
        target.searchParams.set('utm_campaign', 'ep1');
        new URLSearchParams(window.location.search).forEach(function (value, key) {
            target.searchParams.set(key, value);
        });
        location.replace(target.toString());
    }());
    </script>
</head>
<body>
    <p><a href="https://www.beyondshowrooms.com/?utm_source=youtube&amp;utm_medium=video&amp;utm_campaign=ep1">Continue to Beyond Showrooms</a></p>
</body>
